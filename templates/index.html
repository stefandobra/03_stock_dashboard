<html>
<h1>Stock Dashboard</h1>
<h2>Stock: {{symbol.upper()}}</h2>
<p>Current price:      {{quote.c}}</p>
<p>Daily change:       {{quote.d}}</p>
<p>Percentage change:  {{quote.dp}}</p>
<p>Daily high:         {{quote.h}}</p>
<p>Daily low:          {{quote.l}}</p>
<p>Open price:         {{quote.o}}</p>
<p>Previous close:     {{quote.pc}}</p>
    
<form action="/" method="post">
  <label for="symbol">Symbol:</label>
  <input type="text" id="symbol" name="symbol"><br><br>
  <input type="submit" value="Submit">
</form>

</html>
